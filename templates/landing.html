<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SecureVault | Zero-Trust Security</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />

  <style>
    /* ===== Background ===== */
    body {
      background: #020617;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    .glow {
      position: fixed;
      width: 650px;
      height: 650px;
      background: radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%);
      filter: blur(130px);
      animation: float 14s ease-in-out infinite alternate;
    }

    .glow.one { top: -220px; left: -220px; }
    .glow.two { bottom: -220px; right: -220px; animation-delay: 6s; }

    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(90px); }
    }

    /* ===== Shield Animation ===== */
    .shield {
      animation: shieldFloat 6s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(59,130,246,0.6));
    }

    @keyframes shieldFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* ===== Gradient Title ===== */
    .title-gradient {
      background: linear-gradient(90deg, #3b82f6, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===== CTA Buttons ===== */
    .cta {
      transition: all 0.25s ease;
    }

    .cta-primary:hover {
      box-shadow: 0 0 25px rgba(59,130,246,0.6);
      transform: translateY(-2px);
    }

    .cta-secondary:hover {
      background: #3b82f6;
      color: white;
      transform: translateY(-2px);
    }
  </style>
</head>

<body class="text-white flex items-center justify-center h-screen relative">

  <!-- Ambient Glow -->
  <div class="glow one"></div>
  <div class="glow two"></div>

  <!-- Content -->
  <div class="relative z-10 text-center px-6 max-w-2xl">

    <!-- Shield Icon -->
    <svg class="mx-auto mb-8 shield" width="96" height="96" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L3 6v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V6l-9-4z" fill="#3B82F6"/>
      <path d="M12 11a2 2 0 100 4 2 2 0 000-4zm0-3a5 5 0 015 5v1h-2v-1a3 3 0 10-6 0v1H7v-1a5 5 0 015-5z" fill="#ffffff"/>
    </svg>

    <!-- Title -->
    <h1 class="text-5xl md:text-6xl font-extrabold mb-4 title-gradient">
      SecureVault
    </h1>

    <!-- Tagline -->
    <p class="text-lg md:text-2xl text-gray-300 mb-10">
      Zero-Trust Password & Encryption Platform
    </p>

    <!-- CTA -->
    <div class="flex justify-center gap-6 mb-8">
      <a href="/login"
         class="cta cta-primary px-8 py-3 rounded-xl bg-blue-600 font-semibold">
        Login
      </a>

      <a href="/signup"
         class="cta cta-secondary px-8 py-3 rounded-xl border border-blue-500 text-blue-400">
        Get Started
      </a>
    </div>

    <!-- Feature Hint -->
    <p class="text-sm text-gray-400">
      🔐 End-to-end encryption &nbsp;•&nbsp; 🛡️ 2FA & QR Login &nbsp;•&nbsp; 📁 Secure Vault
    </p>

    <p class="text-xs text-gray-500 mt-6">
      Built for security-first users
    </p>

  </div>

</body>
</html>
