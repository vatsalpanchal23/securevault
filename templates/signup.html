<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup | SecureVault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />

  <style>
    /* ===== SecureVault Shared Background (Landing + Auth) ===== */
    body {
      background: #020617;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Ambient glow blobs */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%);
      filter: blur(120px);
      z-index: 0;
      animation: float 12s ease-in-out infinite alternate;
    }

    .glow.one {
      top: -200px;
      left: -200px;
    }

    .glow.two {
      bottom: -200px;
      right: -200px;
      animation-delay: 4s;
    }

    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(80px); }
    }

    /* ===== Glass Card ===== */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
      animation: fadeInUp 0.9s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .securevault-title {
      font-weight: 700;
      font-size: 2.5rem;
      color: #00ffff;
    }

    .form-input {
      background: transparent;
      border-bottom: 2px solid #06b6d4;
      padding: 0.5rem;
      margin-bottom: 1.5rem;
      color: white;
      width: 100%;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: #00ffff;
    }

    .signup-button {
      background-color: #06b6d4;
      width: 100%;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1.125rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s ease, transform 0.2s ease;
      color: white;
    }

    .signup-button:hover {
      background-color: #2563eb;
      transform: scale(1.03);
    }

    .signup-button:active {
      background-color: #1d4ed8;
      transform: scale(0.98);
    }

    .login-link {
      color: #38bdf8;
      font-size: 0.9rem;
      transition: color 0.2s ease;
    }

    .login-link:hover {
      color: #60a5fa;
      text-decoration: underline;
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">

  <!-- Background glow -->
  <div class="glow one"></div>
  <div class="glow two"></div>

  <!-- Signup Card -->
  <div class="glass-card p-10 max-w-md w-full text-center relative z-10">
    <h1 class="securevault-title mb-6">SecureVault</h1>
    <p class="text-lg text-gray-300 mb-6">Create your account</p>

    {% if error %}
    <div class="bg-red-600 text-white px-4 py-2 rounded-lg mb-4 animate-pulse">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/signup">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <input type="text" name="username" placeholder="Username" class="form-input" required />
      <input type="email" name="email" placeholder="Email" class="form-input" required />
      <input type="password" name="password" placeholder="Password" class="form-input" required />

      <button type="submit" class="signup-button mt-4">Sign Up</button>
    </form>

    <p class="text-sm text-gray-400 mt-6">
      Already have an account?
      <a href="/login" class="login-link">Login</a>
    </p>
  </div>

</body>
</html>
