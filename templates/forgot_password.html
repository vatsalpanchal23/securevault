<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | SecureVault</title>

  <meta name="csrf-token" content="{{ csrf_token() }}">

  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1e1e2f, #121212);
      background-size: 400% 400%;
      animation: gradientFlow 10s ease infinite;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'Poppins', sans-serif;
    }
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      padding: 2rem;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    input {
      background: rgba(255, 255, 255, 0.9);
      color: black;
      border-radius: 8px;
      padding: 0.6rem;
      margin-bottom: 1rem;
      width: 100%;
      border: none;
      outline: none;
    }
    button {
      background-color: #06b6d4;
      color: white;
      font-weight: 600;
      width: 100%;
      padding: 0.7rem;
      border-radius: 9999px;
      transition: all 0.3s ease;
    }
    button:hover {
      background-color: #2563eb;
      transform: scale(1.03);
    }
    button:active {
      background-color: #1d4ed8;
      transform: scale(0.97);
    }
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 255, 255, 0.2);
      border-left: 4px solid #00ffff;
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      z-index: 1000;
    }
    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="glass">
    <h2 class="text-2xl font-semibold mb-6 text-cyan-300">Forgot Password</h2>

    <div id="email-step">
      <input id="email" type="email" placeholder="Enter your registered email" required>
      <button onclick="sendOTP()">Send OTP</button>
    </div>

    <div id="reset-step" style="display: none;">
      <input id="otp" type="text" placeholder="Enter OTP" required>
      <input id="new_password" type="password" placeholder="Enter new password" required>
      <button onclick="resetPassword()" class="bg-green-600 hover:bg-green-700">Reset Password</button>
    </div>

    <p class="mt-4 text-sm text-gray-300">
      Remember your password? 
      <a href="/login" class="text-cyan-400 underline">Login here</a>.
    </p>
  </div>

  <div id="toast"></div>

  <script>
    function getCSRF() {
      const m = document.querySelector('meta[name="csrf-token"]');
      return m ? m.getAttribute('content') : '';
    }

    function showToast(message, color = "#00ffff") {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.borderLeftColor = color;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3500);
    }

    async function sendOTP() {
      const email = document.getElementById("email").value.trim();
      if (!email) return showToast("Please enter your email", "#f87171");

      const res = await fetch("/forgot_password", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCSRF()
        },
        body: JSON.stringify({ email })
      });

      const data = await res.json();
      showToast(data.message, data.status === "success" ? "#22c55e" : "#f87171");

      if (data.status === "success") {
        document.getElementById("email-step").style.display = "none";
        document.getElementById("reset-step").style.display = "block";
      }
    }

    async function resetPassword() {
      const email = document.getElementById("email").value.trim();
      const otp = document.getElementById("otp").value.trim();
      const new_password = document.getElementById("new_password").value.trim();
      if (!otp || !new_password) return showToast("All fields are required", "#f87171");

      const res = await fetch("/verify_reset_otp", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCSRF()
        },
        body: JSON.stringify({ email, otp, new_password })
      });

      const data = await res.json();
      showToast(data.message, data.status === "success" ? "#22c55e" : "#f87171");

      if (data.status === "success") {
        setTimeout(() => window.location.href = "/login", 2500);
      }
    }
  </script>

</body>
</html>
